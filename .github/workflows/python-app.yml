名称：刷课
 
关于：
  推：
    分支：[动作]
  #是否开始每天8点定时刷课，若要开启请把下面两行注释去掉
  #日程：
  # - 克朗：“0 8 * * *”
    
职位：
  开始：
    runs-on： ubuntu-latest # 在最新版本的 Ubuntu 操作系统环境下运行
    步骤： # 要执行的步骤
      - 名称：拷贝代码
        用途：actions/checkout@v3 # 用于将GitHub代码仓库的代码拷贝到工作目录中
 
      - 名称：设置python环境
        用途：actions/setup-python@v2 # 用于设置 Python 环境，它允许你指定要在工作环境中使用的 Python 版本
        与：
          Python-version： '3.13' # 选择要用的Python版本
 
      - 名称：安装依赖包
        运行：|# 安装依赖包
pip install -r ./requirements.txt
          
      
      - 名称：Run main.py
        运行：Python main.py -c config.ini
